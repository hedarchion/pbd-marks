<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PBD Marks</title>
<style>
:root {
  --bg: #f2f2f7;
  --surface: #ffffff;
  --surface2: #f5f5fa;
  --text: #1c1c1e;
  --text2: #6d6d72;
  --text3: #aeaeb2;
  --accent: #0066cc;
  --accent-bg: #e8f1fb;
  --green: #2da44e;
  --green-bg: #e6f4ea;
  --orange: #bf6a02;
  --orange-bg: #fef3e0;
  --red: #cf222e;
  --red-bg: #ffeef0;
  --border: #e0e0e5;
  --radius: 14px;
  --radius-sm: 10px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0d0d10;
    --surface: #1c1c20;
    --surface2: #26262b;
    --text: #ededef;
    --text2: #9d9da3;
    --text3: #5d5d63;
    --accent: #4da6ff;
    --accent-bg: #14243b;
    --green: #3fb950;
    --green-bg: #162b1c;
    --orange: #d9870a;
    --orange-bg: #2d2210;
    --red: #f85149;
    --red-bg: #2d1517;
    --border: #333338;
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
body{min-height:100dvh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,0)}

/* Header */
header{
  position:sticky;top:0;z-index:100;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 16px 12px;
}
header h1{font-size:19px;font-weight:800;letter-spacing:-.4px}
header .sub{font-size:11px;color:var(--text2);margin-top:1px}

/* Class tabs */
.class-tabs{
  display:flex;gap:8px;padding:10px 16px;overflow-x:auto;
  scrollbar-width:none;position:sticky;top:61px;z-index:99;
  background:var(--bg);-webkit-overflow-scrolling:touch;
}
.class-tabs::-webkit-scrollbar{display:none}
.class-tab{
  flex-shrink:0;padding:8px 20px;border-radius:22px;
  font-size:14px;font-weight:650;border:1.5px solid var(--border);
  background:var(--surface);color:var(--text2);cursor:pointer;
  transition:all .15s;white-space:nowrap;user-select:none;
  display:flex;align-items:center;gap:7px;
}
.class-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.class-tab .badge{
  font-size:11px;font-weight:700;min-width:22px;height:22px;
  border-radius:11px;display:flex;align-items:center;justify-content:center;
  padding:0 6px;
}
.class-tab.active .badge{background:rgba(255,255,255,.25)}
.class-tab:not(.active) .badge{background:var(--surface2)}
.class-tab .badge.done{color:var(--green)}
.class-tab .badge.partial{color:var(--orange)}

/* Main */
main{
  flex:1;display:flex;flex-direction:column;
  padding:0 16px 16px;width:100%;margin:0 auto;
}

/* Progress */
.progress-wrap{padding:6px 0 14px}
.progress-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.progress-label .pct{font-size:13px;font-weight:700;color:var(--accent)}
.progress-label .detail{font-size:11px;color:var(--text2)}
.progress-bar{height:6px;border-radius:3px;background:var(--surface2);overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .35s ease}

/* Search */
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap input{
  width:100%;padding:11px 14px 11px 36px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--surface);
  font-size:15px;font-family:var(--font);color:var(--text);outline:none;transition:border .15s;
}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap .sicon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}

/* Student list */
.student-list{display:flex;flex-direction:column;gap:3px;max-height:50vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.student-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:var(--radius-sm);
  background:var(--surface);border:1.5px solid transparent;
  cursor:pointer;transition:all .1s;user-select:none;
}
.student-row:active{transform:scale(.985)}
.student-row.selected{border-color:var(--accent);background:var(--accent-bg)}
.student-row .no{font-size:11px;color:var(--text3);width:20px;flex-shrink:0;text-align:right}
.student-row .name{flex:1;font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.student-row .preview{font-size:11px;color:var(--text2);flex-shrink:0;text-align:right;line-height:1.3}
.student-row .preview strong{color:var(--text)}
.student-row .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.student-row .dot.c{background:var(--green)}
.student-row .dot.p{background:var(--orange)}
.student-row .dot.n{background:var(--border)}

/* Empty state */
.empty-state{
  text-align:center;padding:60px 20px;color:var(--text3);
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.empty-state svg{opacity:.35}
.empty-state p{font-size:14px}

/* Marks panel */
.marks-panel{
  background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border);overflow:hidden;display:none;
}
.marks-panel.open{display:block}
.marks-panel-header{
  padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.marks-panel-header .sname{font-size:16px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.marks-panel-header .sno{font-size:12px;color:var(--text2);margin-right:4px}
.marks-panel-header .close-btn{
  width:32px;height:32px;border-radius:50%;border:none;
  background:var(--surface2);color:var(--text2);font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* Paper inputs */
.paper-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px;
}
.paper-card{
  background:var(--surface2);border-radius:var(--radius);
  padding:20px 16px;text-align:center;border:2px solid transparent;transition:border .15s;
}
.paper-card:focus-within{border-color:var(--accent)}
.paper-card .paper-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:8px}
.paper-card input{
  width:100%;font-size:36px;font-weight:800;text-align:center;
  border:none;background:transparent;color:var(--text);
  font-family:var(--font);outline:none;padding:6px 0;
  letter-spacing:-1px;
}
.paper-card input::placeholder{color:var(--text3)}
.paper-card .paper-max{font-size:12px;color:var(--text3);margin-top:6px}

/* Summary */
.summary-card{
  display:flex;gap:8px;padding:0 16px 16px;
}
.summary-item{
  flex:1;background:var(--surface2);border-radius:var(--radius-sm);
  padding:13px 8px;text-align:center;min-width:0;
}
.summary-item .val{font-size:20px;font-weight:800;letter-spacing:-.5px;line-height:1.2}
.summary-item .lbl{font-size:10px;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.summary-item.ga .val,.summary-item.gb .val{color:var(--green)}
.summary-item.gc .val{color:var(--orange)}
.summary-item.gd .val,.summary-item.ge .val,.summary-item.gf .val{color:var(--red)}

/* Action bar */
.action-bar{
  display:flex;gap:10px;padding:10px 16px;
  border-top:1px solid var(--border);background:var(--surface);
  position:sticky;bottom:0;padding-bottom:max(10px, env(safe-area-inset-bottom, 0));
}
.action-bar button{
  flex:1;padding:12px;border-radius:var(--radius-sm);
  font-size:14px;font-weight:600;font-family:var(--font);
  cursor:pointer;border:none;transition:all .1s;
}
.btn-export{background:var(--surface2);color:var(--text)}
.btn-export:active{opacity:.7}
.btn-clear{background:var(--red-bg);color:var(--red);font-size:12px}
.btn-clear:active{opacity:.7}

/* Keyboard hint */
.kbd-hint{
  text-align:center;font-size:11px;color:var(--text3);
  padding:6px 0 0;display:none;
}
@media (min-width:720px){.kbd-hint{display:block}}

/* Desktop */
@media (min-width:720px){
  main{display:grid;grid-template-columns:380px 1fr;gap:20px;align-items:start;max-width:1000px}
  .left-col{position:sticky;top:130px}
  .right-col{min-height:300px}
  .student-list{max-height:58vh}
  .paper-grid{grid-template-columns:1fr 1fr;gap:16px;padding:20px}
  .paper-card{padding:24px 20px}
  .paper-card input{font-size:40px}
  .summary-card{padding:0 16px 16px}
  .summary-item{padding:12px 10px}
  .summary-item .val{font-size:20px}
  header,.class-tabs{padding-left:max(16px,calc((100vw - 1000px)/2));padding-right:max(16px,calc((100vw - 1000px)/2))}
  .action-bar{padding-left:max(16px,calc((100vw - 1000px)/2));padding-right:max(16px,calc((100vw - 1000px)/2))}
}
@media (min-width:720px) and (max-width:860px){
  main{grid-template-columns:300px 1fr}
}
</style>
</head>
<body>
<header>
  <h1>PBD Marks</h1>
  <div class="sub">SMK Methodist Tanjong Malim</div>
</header>
<div class="class-tabs" id="classTabs"></div>
<main>
  <div class="left-col">
    <div class="progress-wrap">
      <div class="progress-label">
        <span class="pct" id="progressPct">0%</span>
        <span class="detail" id="progressDetail">0 of 0 complete</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="search-wrap">
      <svg class="sicon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>
      <input type="text" id="searchInput" placeholder="Search student..." autocomplete="off">
    </div>
    <div class="student-list" id="studentList"></div>
    <div class="kbd-hint">Esc to deselect &middot; click to select</div>
  </div>
  <div class="right-col" id="rightCol">
    <div id="marksContainer"></div>
    <div class="empty-state" id="emptyState">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2.5"/><path d="M7 8h10M7 12h10M7 16h6"/></svg>
      <p>Select a student to enter marks</p>
    </div>
  </div>
</main>
<div class="action-bar">
  <button class="btn-export" id="btnExport">Export Markdown</button>
  <button class="btn-clear" id="btnClear">Clear All</button>
</div>

<script>
const STUDENTS = {
  '1E':['ADZIN DANISH BIN SUNIZA','AINNUR RAUDHAH BINTI NORAZILAN','CELINE YAN-XIN PHEE','CHAI ZI JIAN','DENI AAGO ANAK DONNY','DHIVINIESH RAO A/L LAGES RAO','HUZAIFAH BIN MOHD ADHA MIZAN','JAYAMITTHRA A/P VIKNESH WARAN','KALVIN PILLAI A/L YOGANATHAN','KEERTHIKAN A/L VIKNESWARAN','KHAYLA DHIA JANNAH BINTI MOHAMED SYAHARANI','KRETTISHA NAIR A/P SASITHARAN','LOW MEI YIK','MOHAMAD AQIL FAYYADH BIN MOHD FAIZAL HASRIQ','MUHAMMAD AMMAR ZIQRI BIN MOHD ZULKARNAEN','NUR ADNI IRDINA BINTI ROZANIZAM','NUR ANIS DZAKIRAH BINTI MOHD NOR RIZUAN','NUR MADINAH MUSFIRAH BINTI MUHAMAD RAFI','NUR QISYA ANGGUN BINTI MOHD HAZLI','NUR ZARA DAMIA BINTI MOHD NOR HISHAM AFANDI','NURIN MIRZA AMANDA BINTI MOHAMED AZIZUL','NURUL ALIYAH BINTI MOHD NOOR HAFIZ','NURUL IMAN ADLINA BINTI MOHAMMAD EFENDY','PUTRI AYESHA ZARA BINTI ABD RAHMAN','SHARVENI A/P PAIDAIAH','THANUSHA A/P RAAJAN','TUESZITA YAH BINTI BAH HALIM'],
  '2E':['AHMAD AMSYAR BIN KHAIRUL ANUAR','ALIFF FAHMII AHMAD BIN FIRDAUS','AQILAH HASNAA\' BINTI HAZIZUL AZIZ','AREEJ AZ ZAHRA BINTI AHMAD NAJDI','AZWA SHAHIRAH BINTI MOHD SHAFIQ','DEVESH A/L VISU','FAWWAZ ZAHIRUL BIN MOHD ADMI','HANI RAIHANNAH BINTI GEGE NURFAIZEE','KHAISARA IRDINA BINTI ROSLEE','LEONG KAH KIN','LOHSHENY A/P THARMARAJ','MITHISH RAJ A/L GUNALAN','MUHAMMAD AIMAN ISKANDAR BIN JEFRY','MUHAMMAD YUSUF IMRAN BIN NORHISAM','MUZAMIN IRFAN SYAH BIN MUZAFARSYAH','NATALIE TAN KOO CHENG','NG MIN HYN','NOR SHAMEERA BINTI T SHANMUGANATHAN','NUR AIN FARIESYA EDRIEANA BINTI MOHD FAZELI','NUR ALIYA FATIHAH BINTI MOHD HAMSAH','NUR DAMIA QISTINA BINTI JAFLAILY','NUR DHIYA NELLISA BINTI MAT NASIR','NUR KAMILIA BINTI MOHAMMAD AZRIN','NUR RASYIQAH ZAHRA BINTI RAZIB','NURKHALISHAH AZZAHRA BINTI KAMALFIKRI','NURUL SYAMILLA AMANI BINTI AMINUDDIN','NURUL SYAMILLA AMMNI BINTI AMINUDDIN','SANTOSH RAU A/L SIMATHRIRAO','SONG ZI HUEI'],
  '1D':['DHARSHAYANI A/P PAUL','MOHAMAD RYYAN BIN ROSLAN','MOHAMAD WAFY HAU BIN MOHAMAD ALIF HAKIM HENG','MUHAMAD HARITH AQASHA BIN AHMAD TARMIZI','MUHAMMAD AFIQ ZIYAD BIN ZAHID','MUHAMMAD FIRDAUS ALFANDI BIN HARIZAN','MUHAMMAD IZZUDIN BIN MOHD KHARULNIZAM','MUHAMMAD NAZRIN BIN ABDUL RAHMAN','MUHAMMAD SYAHIR HAIKAL BIN KAMALRULIZUWAN','MUHAMMAD THAQIF DANIAL BIN RIDZUAN','MUHAMMAD ZULZAHRIN SYAZANI BIN MOHD FAIZAL','MUSLIMAHTUL RAMADANI','NICK MIKHAEL BIN HENDRA CIPTA','NUR AMNI AWATIF BINTI ZUHAIRI SYAMSUL','NUR DAYANA QHAIRENA BINTI ZAILI','NUR FAQIHAH HUMAIRA BINTI MOHAMMAD FADIL','NUR INDRIANNA MIKAYLA BINTI MUHAMAD NIZAM','NUR\'IRISH ZARA AMNA BINTI ZAMHELMI','RISZUWAN HAIQAL BIN MOHD JAMIL','SANTHIYA A/P SUBRAMANIAM','THANANTIGALLY A/P VENKADESVARAN','THAQIF UMAR BIN NORAJAZIRI','THARINISH A/L SARAWANAN','TISHANTHAN A/L RAJA KUMARAN','WARDAH ZHUFAIRAH SABRINA BINTI WAN MISRAN'],
  '2D':['ADRIESYA SHAHZUELIA BINTI SHAH MIRZA','INDAH SUFIHA BINTI MOHD FAISAL','IZZARA SAFIYA BINTI MUAMMAR GADAFI','IZZ RAYYAN ARASY BIN MOHAMMAD SAPUAN IKMAL','MOHAMMAD IZZ MUQRI BIN MOHAMAD SHARIF','MOHD AIDIL FITRI BIN ABDULLAH','MUHAMMAD AIMAN RAYYAN BIN ABDULLAH','MUHAMMAD AMIRUL QAYYUM BIN MOHD HATIM MUL-ALSOR','MUHAMMAD ARMAN BIN ALWI','MOHAMAD HAZIM DANIEL BIN HAMDAN','MUHAMMAD IRFAN RAYYANI BIN MOHAMAD ILZAM','MUHAMMAD SAMIR NAZRI BIN MOHD AZMI','NUR ALEEYA HAZIRA BINTI AHMAD KAMAL KHAIRUDIN','NUR HAWANI QISTINA BINTI MUKKOMIN','NUR IFFAH FARHANAH BINTI MOHD FAISAL','NUR INSYIRAH WADHIAH BINTI AZHAR','NUR IRIS JANNAH MIRZA BINTI MOHD FAIZAL','NURLAILY UMAIRAH BINTI AZEZE','NURUL QISTINA BINTI MOHD AZMAN','PUTERI NUR DAMIA IRDINA BINTI MOHAMMAD ROSHIDI','PUTI DARWISYAH SAFIYYAH BINTI DZAHER MUKHAIZAT','RAFLI BIN GHAZALI','SATHIYA SEELAN A/L SURUNTERAN','SYAHRUL NIZAR HAFIDH BIN SYAHRUDEE','WILDA AMILYN ZULAIKHA BINTI KAMARULZAMAN','MUHAMMAD SYAHMI HARIS BIN MOHD FARIHAN','MUHAMMAD ADEEB BIN MOHAMAD SHARIFUDDIN'],
  '1M':['AAYRA FAIZ FIRMAN BINTI MOHAMAD FAIZ','AFIF IRSYADUDDIN BIN NOR ANUAR','AHMAD HARRAZ BIN AHMAD HEZAL','AUNI BINTI MOHAMAD YUSAINI','CHOYE KAI EN','DHIVENASSH A/L RAVINDRAN','FATIN AQILAH BINTI AMAR','FATIN NURZAFIRAH BINTI HAIRUL HAFIZI','GAN KOK XIAN','HADWIN A/L JESAN','JAVIS OH WEI XIANG','LAKSMITA A/P NAVUKARASAN','LAVANYA A/P RAVIKUMAR','LEE KOK SING','LITTHIKA A/P PRABHAKARAN','LOOK TIN WOUN','MUHAMMAD IZZAT BIN MOHD AZHAR','MUHAMMAD NAJMI MIKHAEL BIN MUHAMMAD ZAID','QASRINA PUTERI ALISHA BINTI MUHAMMAD HAFIZ','SITI ZAHIRAH BINTI MOHD ZAIDDI','THANUSHA VARSHINEE A/P THANACHELVAN','THOMAWATY A/P YUVARAJ','YAAZHINIY A/P PUGALENTHI','YAISWANTH A/L VATHUMALI']
};

const GRADE_SCALE = [
  {min:82,max:100,grade:'A',cls:'ga',desc:'Cemerlang (Excellent)'},
  {min:66,max:81,grade:'B',cls:'gb',desc:'Kepujian (Credit)'},
  {min:50,max:65,grade:'C',cls:'gc',desc:'Baik (Good)'},
  {min:35,max:49,grade:'D',cls:'gd',desc:'Memuaskan (Satisfactory)'},
  {min:20,max:34,grade:'E',cls:'ge',desc:'Mencapai Tahap Minimum'},
  {min:0,max:19,grade:'F',cls:'gf',desc:'Belum Mencapai Tahap Minimum'}
];

let currentClass = localStorage.getItem('pbd_current_class')||'1E';
if (!STUDENTS[currentClass]) { currentClass = Object.keys(STUDENTS)[0]; localStorage.setItem('pbd_current_class', currentClass); }
let selectedIdx = null;
let marksCache = {};
let apiOnline = false;

// ── localStorage fallback ──
const LS_KEY = 'pbd_marks_data';
function saveLocal() { try { localStorage.setItem(LS_KEY, JSON.stringify(marksCache)); } catch {} }
function loadLocal() { try { const r = localStorage.getItem(LS_KEY); return r ? JSON.parse(r) : null; } catch { return null; } }

async function apiFetch(url, opts={}) {
  const res = await fetch(url, { headers: {'Content-Type':'application/json'}, ...opts });
  if (!res.ok) throw new Error(res.statusText);
  return res.json();
}

async function loadMarks(cls) {
  try {
    const docs = await apiFetch('/api/marks?class='+encodeURIComponent(cls));
    apiOnline = true;
    const local = loadLocal();
    // Build map from localStorage for this class (preserves most recent edits)
    const localMap = {};
    if (local && local[cls]) { for (const e of local[cls]) localMap[e.idx] = e; }
    marksCache[cls] = docs.map(d => {
      const le = localMap[d.idx];
      // Prefer localStorage paper values for touched entries (API may be stale)
      if (le && (le._t1 || le._t2)) {
        return { ...d, paper1: le.paper1, paper2: le.paper2, _t1: !!le._t1, _t2: !!le._t2 };
      }
      // No localStorage for this student — derive touch state from DB values
      return { ...d, _t1: d.paper1 > 0, _t2: d.paper2 > 0 };
    });
  } catch {
    apiOnline = false;
    const local = loadLocal();
    marksCache[cls] = (local && local[cls]) ? local[cls] : (marksCache[cls] || []);
  }
}

async function saveMarks(cls, idx, paper1, paper2) {
  saveLocal();
  try { await apiFetch('/api/marks', {method:'POST', body: JSON.stringify({cls,idx,paper1,paper2})}); apiOnline = true; }
  catch { apiOnline = false; }
}

function getMarks(cls, idx) {
  const entry = (marksCache[cls]||[]).find(m=>m.idx===idx);
  return entry || {paper1:0, paper2:0, _t1:false, _t2:false};
}
function setMarks(cls, idx, paper, val) {
  const v = Math.max(0, Math.min(40, parseInt(val)||0));
  let entry = (marksCache[cls]||[]).find(m=>m.idx===idx);
  if (!entry) { entry = {cls, idx, paper1:0, paper2:0, _t1:false, _t2:false}; if(!marksCache[cls]) marksCache[cls]=[]; marksCache[cls].push(entry); }
  entry[paper] = v;
  entry[paper === 'paper1' ? '_t1' : '_t2'] = true;
  saveMarks(cls, idx, entry.paper1, entry.paper2);
}

function getPaper1(m){return m._t1 ? (m.paper1 ?? 0) : 0;}
function getPaper2(m){return m._t2 ? (m.paper2 ?? 0) : 0;}
function getTotalPct(m){if(!m._t1 && !m._t2) return 0; const t=(m._t1?m.paper1:0)+(m._t2?m.paper2:0);return Math.round((t/80)*100);}
function getGrade(pct){for(const g of GRADE_SCALE)if(pct>=g.min&&pct<=g.max)return g;return GRADE_SCALE[GRADE_SCALE.length-1];}
function hasMarks(cls,idx){const m=getMarks(cls,idx);return m._t1 === true || m._t2 === true;}
function isComplete(cls,idx){const m=getMarks(cls,idx);return m._t1 === true && m._t2 === true;}

// Fuzzy search
function fuzzyMatch(query,target){
  const q=query.toLowerCase().replace(/\s+/g,''),t=target.toLowerCase().replace(/\s+/g,'');
  if(!q)return{match:true,score:1};
  let qi=0,score=0,consec=0;
  for(let ti=0;ti<t.length&&qi<q.length;ti++){
    if(t[ti]===q[qi]){qi++;consec++;score+=consec*10+(ti===0?20:0)+(t[ti]===' '?5:0);}
    else{consec=0;score-=1;}
  }
  return{match:qi===q.length,score};
}

// ── Render ──
function renderClassTabs(){
  const el=document.getElementById('classTabs');
  el.innerHTML=Object.keys(STUDENTS).map(cls=>{
    const arr=STUDENTS[cls];
    let done=0,partial=0;
    arr.forEach((_,i)=>{if(isComplete(cls,i))done++;else if(hasMarks(cls,i))partial++;});
    const total=done+partial;
    const badgeCls=done===arr.length?'done':(total>0?'partial':'');
    const badge=total>0?`<span class="badge ${badgeCls}">${done}/${arr.length}</span>`:'';
    return `<div class="class-tab${cls===currentClass?' active':''}" data-cls="${cls}">${cls}${badge}</div>`;
  }).join('');
}

function renderProgress(){
  const arr=STUDENTS[currentClass];
  let done=0,partial=0;
  arr.forEach((_,i)=>{if(isComplete(currentClass,i))done++;else if(hasMarks(currentClass,i))partial++;});
  const pct=arr.length?Math.round((done/arr.length)*100):0;
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressDetail').textContent=done+' of '+arr.length+' complete'+(partial?' ('+partial+' partial)':'');
  document.getElementById('progressFill').style.width=pct+'%';
}

function renderStudentList(){
  const q=document.getElementById('searchInput').value;
  const arr=STUDENTS[currentClass];
  const scored=arr.map((name,i)=>({...fuzzyMatch(q,name),name,i}));
  const filtered=scored.filter(x=>x.match).sort((a,b)=>b.score-a.score);

  document.getElementById('studentList').innerHTML=filtered.map(({name,i})=>{
    const m=getMarks(currentClass,i);
    const p1=getPaper1(m),p2=getPaper2(m),pct=getTotalPct(m);
    const done=isComplete(currentClass,i),any=hasMarks(currentClass,i);
    const dotCls=done?'c':(any?'p':'n');
    let preview='';
    if(any)preview=`<strong>${pct}%</strong> ${getGrade(pct).grade}<br><span style="font-size:10px">P1:${p1} P2:${p2}</span>`;
    const sel=selectedIdx===i?' selected':'';
    return `<div class="student-row${sel}" data-idx="${i}">
      <span class="no">${i+1}</span><span class="name">${name}</span>
      <span class="preview">${preview}</span><span class="dot ${dotCls}"></span>
    </div>`;
  }).join('');
}

function renderMarksPanel(){
  const container=document.getElementById('marksContainer');
  const empty=document.getElementById('emptyState');
  if(selectedIdx===null){container.innerHTML='';empty.style.display='';return;}
  empty.style.display='none';
  const name=STUDENTS[currentClass][selectedIdx];
  const m=getMarks(currentClass,selectedIdx);
  const p1=getPaper1(m),p2=getPaper2(m),pct=getTotalPct(m);
  const grade=getGrade(pct);

  container.innerHTML=`
  <div class="marks-panel open">
    <div class="marks-panel-header">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><span class="sno">#${selectedIdx+1}</span><span class="sname">${name}</span></span>
      <button class="close-btn" id="btnClosePanel">&times;</button>
    </div>
    <div class="paper-grid">
      <div class="paper-card">
        <div class="paper-label">Paper 1</div>
        <input type="number" min="0" max="40" value="${m._t1 ? m.paper1 : ''}" placeholder="0"
          oninput="updatePaper('paper1',this.value)">
        <div class="paper-max">/ 40</div>
      </div>
      <div class="paper-card">
        <div class="paper-label">Paper 2</div>
        <input type="number" min="0" max="40" value="${m._t2 ? m.paper2 : ''}" placeholder="0"
          oninput="updatePaper('paper2',this.value)">
        <div class="paper-max">/ 40</div>
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-item ${grade.cls}">
        <div class="val">${pct}%</div><div class="lbl">Total</div>
      </div>
      <div class="summary-item ${grade.cls}">
        <div class="val">${grade.grade}</div><div class="lbl">${grade.desc}</div>
      </div>
    </div>
  </div>`;

  document.getElementById('btnClosePanel').addEventListener('click',()=>{selectedIdx=null;renderAll();});
}

function updatePaper(paper,val){
  if(selectedIdx===null)return;
  setMarks(currentClass,selectedIdx,paper,val);
  const m=getMarks(currentClass,selectedIdx);
  const p1=getPaper1(m),p2=getPaper2(m),pct=getTotalPct(m);
  const grade=getGrade(pct);
  const sc=document.querySelector('.summary-card');
  if(sc){
    sc.innerHTML=`
      <div class="summary-item ${grade.cls}"><div class="val">${pct}%</div><div class="lbl">Total</div></div>
      <div class="summary-item ${grade.cls}"><div class="val">${grade.grade}</div><div class="lbl">${grade.desc}</div></div>`;
  }
  renderProgress();
  renderClassTabs();
  renderStudentList();
}

function renderAll(){renderClassTabs();renderProgress();renderStudentList();renderMarksPanel();}

// ── Export ──
async function exportMarkdown(){
  try {
    // Try server-side export first
    const res = await fetch('/api/export');
    if (res.ok) {
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'PBD_Marks.md'; a.click();
      URL.revokeObjectURL(url);
      return;
    }
  } catch {}
  // Fallback: client-side export from cache
  let md='# PBD Marks\n\n';
  for(const cls of Object.keys(STUDENTS)){
    md+=`## ${cls}\n\n| No | Name | Paper 1 | Paper 2 | Total | Grade |\n|----|------|---------|---------|-------|-------|\n`;
    STUDENTS[cls].forEach((name,i)=>{
      const m=getMarks(cls,i);
      const any=(m.paper1||0)>0||(m.paper2||0)>0;
      md+=`| ${i+1} | ${name} | ${any?getPaper1(m):''} | ${any?getPaper2(m):''} | ${any?getTotalPct(m)+'%':''} | ${any?getGrade(getTotalPct(m)).grade:''} |\n`;
    });
    md+='\n';
  }
  const b=new Blob([md],{type:'text/markdown'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download='PBD_Marks.md';a.click();
  URL.revokeObjectURL(u);
}

// ── Events ──
document.getElementById('classTabs').addEventListener('click',async e=>{
  const tab=e.target.closest('.class-tab');
  if(!tab)return;
  currentClass=tab.dataset.cls;
  localStorage.setItem('pbd_current_class',currentClass);
  selectedIdx=null;document.getElementById('searchInput').value='';
  renderAll();
  await loadMarks(currentClass);
  renderAll();
});
document.getElementById('studentList').addEventListener('click',e=>{
  const row=e.target.closest('.student-row');
  if(!row)return;
  selectedIdx=parseInt(row.dataset.idx);
  renderAll();
  if(window.innerWidth<720)document.getElementById('marksContainer').scrollIntoView({behavior:'smooth'});
});
document.getElementById('searchInput').addEventListener('input',()=>renderStudentList());
document.getElementById('btnExport').addEventListener('click',exportMarkdown);
document.getElementById('btnClear').addEventListener('click',async ()=>{
  if(confirm('Delete all marks data? This cannot be undone.')){
    try { await apiFetch('/api/clear', {method:'POST'}); } catch {}
    for(const k of Object.keys(marksCache)) marksCache[k]=[];
    try { localStorage.removeItem(LS_KEY); } catch {}
    selectedIdx=null;document.getElementById('searchInput').value='';renderAll();
  }
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&selectedIdx!==null){selectedIdx=null;renderAll();document.getElementById('searchInput').focus();}
});

(async function init(){
  renderAll();
  await loadMarks(currentClass);
  renderAll();
})();
</script>
</body>
